# Global
$mon1 = eDP-1
$terminal = alacritty
$menu = rofi -show run -matching fuzzy -dpi 96
$mainMod = WIN
$altMod = ALT
$sink = virtual-output-control

# Display
monitor=$mon1, 1920x1280@60, 0x0, 1
monitor= , preferred, auto-left, 1

# Start up
exec-once = hyprpaper
exec-once = fcitx5
exec-once = eww open bar

# Env
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME,qt5ct

# Variables
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 250
    repeat_rate = 50
    follow_mouse = 2
    mouse_refocus = no
    float_switch_override_focus = 0

    touchpad {
        disable_while_typing = no
        natural_scroll = yes
        tap-to-click = yes
        tap-and-drag = yes
    }

    sensitivity = 0
}

cursor {
    no_warps = yes
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = master
}

animations {
    enabled = yes

    animation = workspaces, 1, 3, default
    animation = windows, 1, 3, default
    animation = fade, 1, 5, default
}

dwindle {
    force_split = 2
    pseudotile = yes
    preserve_split = yes
    smart_split = no
    smart_resizing = no
}

master {
    mfact = 0.50
    new_status = slave
    smart_resizing = no
}

scrolling {
    column_width = 0.5
}

group {
    groupbar {
        enabled = yes
        render_titles = no
        height = 0
        scrolling = no
    }
}

misc {
    force_default_wallpaper = 0
    vfr = no
    middle_click_paste = no
    enable_anr_dialog = no
}

gestures {
    workspace_swipe_distance = 100
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_use_r = yes

    gesture = 4, horizontal, workspace
    gesture = 3, up, dispatcher, exec, wtype -k Home
    gesture = 3, down, dispatcher, exec, wtype -k End
    gesture = 3, left, dispatcher, exec, wtype -k XF86Back
    gesture = 3, right, dispatcher, exec, wtype -k XF86Forward
}

# Rules
#windowrule = suppress_event maximize, match:class .*
windowrule = match:class (?i).*moonlight.*, workspace 4 silent
windowrule = match:class (?i).*bisq.*, workspace 5 silent
windowrule = match:class (?i).*thunderbird.*, workspace 5 silent
workspace = 1, monitor:$mon1
workspace = 2, monitor:$mon1
workspace = 3, monitor:$mon1
workspace = 4, monitor:$mon1
workspace = 5, monitor:$mon1
workspace = 6, monitor:$mon1
workspace = 7, monitor:$mon1
workspace = 8, monitor:$mon1
workspace = 9, monitor:$mon1

# Submap:reset
submap = reset

# Basic binds
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Q, killactive,
bind = $altMod, Space, exec, $menu
bind = $mainMod SHIFT, M, exit,

# Fn
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume $sink +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume $sink -5%
binde = , XF86AudioMute, exec, pactl set-sink-volume $sink 0
binde = , XF86MonBrightnessUp, exec, brightnessctl s 2%+
binde = , XF86MonBrightnessDown, exec, brightnessctl s 2%-
bind = , Print, exec, grim
bind = SHIFT, Print, exec, slurp | grim -g -

# Window
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod $altMod, F, fullscreenstate, -1, 2

# dwindle
bind = $mainMod, E, togglesplit,
bind = $mainMod, W, togglegroup,
bind = $mainMod SHIFT, Minus, layoutmsg, preselect d
bind = $mainMod SHIFT, Backslash, layoutmsg, preselect r

# Move focus
binde = $mainMod, left, movefocus, l
binde = $mainMod, right, movefocus, r
binde = $mainMod, up, movefocus, u
binde = $mainMod, down, movefocus, d
binde = $mainMod, H, movefocus, l
binde = $mainMod, L, movefocus, r
binde = $mainMod, K, movefocus, u
binde = $mainMod, J, movefocus, d

# Move window
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace (scratchpad)
bind = $mainMod, Equal, focusmonitor, $mon1
bind = $mainMod, Equal, togglespecialworkspace, rand
bind = $mainMod SHIFT, Equal, movetoworkspacesilent, special:rand
bind = $mainMod, Grave, focusmonitor, $mon1
bind = $mainMod, Grave, togglespecialworkspace, util
bind = $mainMod SHIFT, Grave, movetoworkspacesilent, special:util

# Mouse actions
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
